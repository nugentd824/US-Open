# Render Blueprint — one-click deploy of the single long-running Node server.
# In the Render dashboard: New > Blueprint, point it at this repo. Then set the
# secret env vars (ODDS_API_KEY / SPORTRADAR_API_KEY) under the service.
#
# WebSockets work on Render web services on the same port — no extra config.
# A persistent disk keeps the SQLite database across deploys/restarts.
services:
  - type: web
    name: fairway-fantasy
    runtime: node
    plan: starter # "starter" (or higher) is required for a persistent disk
    # --include=dev forces Vite (a devDependency) to install even though
    # NODE_ENV=production, so the client build succeeds.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node server/src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.11.0" # pin Node; newer (e.g. 26) breaks better-sqlite3's native build
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/app.db
      - key: ODDS_PROVIDER
        value: mock # set to "theoddsapi" once ODDS_API_KEY is configured
      - key: SCORE_PROVIDER
        value: mock # set to "sportradar" once SPORTRADAR_API_KEY is configured
      - key: SCORE_POLL_SECONDS
        value: "60"
      # Lock cross-origin access to your Vercel frontend, e.g.
      # https://fairway-fantasy.vercel.app  ("*" allows any origin).
      - key: CORS_ORIGINS
        value: "*"
      - key: ODDS_API_KEY
        sync: false # set as a secret in the dashboard
      - key: SPORTRADAR_API_KEY
        sync: false # set as a secret in the dashboard
    disk:
      name: fairway-data
      mountPath: /var/data
      sizeGB: 1
